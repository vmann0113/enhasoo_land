<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>은하수한복 예약상담</title>

  <link rel="stylesheet" href="style.css?v=20260302-EUNGASU-3" />

  <!-- ✅ CTA 덮어쓰기 (반투명 + 테두리 제거 + #2c6f7f) -->
  <style>
    :root{
      --eungasu:#2c6f7f;
    }

    .hb-fixed-cta{
      background: rgba(255,255,255,0.72) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 0 !important;
      border-top: 0 !important;
      box-shadow: 0 -10px 28px rgba(0,0,0,0.08) !important;
    }

    .hb-branchBtn{
      background: var(--eungasu) !important;
      color:#fff !important;
      border:0 !important;
      box-shadow:none !important;
    }

    .hb-actionPanel{
      background: transparent !important;
      border:0 !important;
    }

    .hb-action{
      background: transparent !important;
      border:0 !important;
      box-shadow:none !important;
    }

    .hb-action .hb-lbl{
      color: var(--eungasu) !important;
      font-weight:800;
    }

    .hb-action:active{
      background: rgba(44,111,127,0.06) !important;
    }
  </style>
</head>

<body>

<main class="landing">

  <section class="block">
    <img src="assets/01_hero.webp" alt="히어로">
  </section>

  <section class="block short">
    <img src="assets/02_store_intro.webp" alt="매장소개">
  </section>

  <section class="block short">
    <img src="assets/03_accesary.webp" alt="악세사리">
  </section>

  <section class="block short">
    <img src="assets/04_review.webp" alt="리뷰">
  </section>

  <section class="block">
    <img src="assets/05_footer.webp" alt="푸터">
  </section>

</main>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- =========================
   ✅ Eungasu Fixed CTA
========================= -->
<div class="hb-fixed-cta" id="hbFixedCta">

  <div class="hb-branchBtn">
    <span class="hb-branchTxt">은하수한복 상담 바로가기</span>
  </div>

  <div class="hb-actionPanel">

    <a class="hb-action" id="hbBtnCall" href="#">
      <span class="hb-ico" style="background-image:url('assets/btn-call.png');"></span>
      <span class="hb-lbl">전화문의</span>
    </a>

    <a class="hb-action" id="hbBtnKakao" href="#">
      <span class="hb-ico" style="background-image:url('assets/btn-kakao.png');"></span>
      <span class="hb-lbl">카톡문의</span>
    </a>

    <a class="hb-action" id="hbBtnReserve" href="#">
      <span class="hb-ico" style="background-image:url('assets/btn-reserve.png');"></span>
      <span class="hb-lbl">네이버예약</span>
    </a>

    <a class="hb-action" id="hbBtnMore" href="#">
      <span class="hb-ico" style="background-image:url('assets/btn-more.png');"></span>
      <span class="hb-lbl">더 알아보기</span>
    </a>

  </div>
</div>

<script>
/* =========================
   CONFIG (은하수 전용)
========================= */
const BRAND_NAME = "은하수한복";
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzxcZWKjh33hmFLLXFAyiMlMIXN0LfUDHUgmd_78_U9lqG1XXruTGcVfn8IEuwY4BieyQ/exec";

const FIXED_PHONE   = "01042122407";
const FIXED_KAKAO   = "https://open.kakao.com/o/s6RE7Udh";
const FIXED_RESERVE = "https://m.booking.naver.com/booking/6/bizes/1027108";
const FIXED_MORE    = "https://www.instagram.com/eunhasuhanbok/";

/* =========================
   Toast
========================= */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(msg){
  if(!toastEl){ alert(msg); return; }
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2200);
}

/* =========================
   Session + Logger
========================= */
function getSessionId(){
  const k="EUNGASU_SID";
  let v = localStorage.getItem(k);
  if(!v){
    v = Date.now()+"_"+Math.random().toString(16).slice(2);
    localStorage.setItem(k,v);
  }
  return v;
}

function sendClickEvent(action, source){
  const payload = JSON.stringify({
    type:"click",
    brand:BRAND_NAME,
    action:action,
    source:source,
    sessionId:getSessionId(),
    page:location.pathname,
    referrer:document.referrer,
    ua:navigator.userAgent,
    ts:Date.now()
  });

  try{
    if(navigator.sendBeacon){
      navigator.sendBeacon(GAS_WEBAPP_URL, payload);
      return;
    }
  }catch(e){}

  fetch(GAS_WEBAPP_URL,{
    method:"POST",
    body:payload,
    keepalive:true
  }).catch(()=>{});
}

/* =========================
   CTA 이벤트
========================= */
document.getElementById("hbBtnCall").addEventListener("click", function(e){
  e.preventDefault();
  sendClickEvent("call","cta");
  window.location.href = "tel:" + FIXED_PHONE;
});

document.getElementById("hbBtnKakao").addEventListener("click", function(e){
  e.preventDefault();
  sendClickEvent("kakao","cta");
  window.open(FIXED_KAKAO, "_blank", "noopener,noreferrer");
});

document.getElementById("hbBtnReserve").addEventListener("click", function(e){
  e.preventDefault();
  sendClickEvent("reserve","cta");
  window.open(FIXED_RESERVE, "_blank", "noopener,noreferrer");
});

document.getElementById("hbBtnMore").addEventListener("click", function(e){
  e.preventDefault();
  sendClickEvent("more","cta");
  window.open(FIXED_MORE, "_blank", "noopener,noreferrer");
});

/* CTA 높이 변수 */
function setHbCtaHeightVar(){
  const cta = document.getElementById("hbFixedCta");
  const h = cta ? Math.round(cta.getBoundingClientRect().height) : 0;
  document.documentElement.style.setProperty('--ctaH', h + 'px');
}
window.addEventListener('resize', setHbCtaHeightVar);
window.addEventListener('load', ()=> setTimeout(setHbCtaHeightVar, 50));
setHbCtaHeightVar();
</script>

</body>
</html>
