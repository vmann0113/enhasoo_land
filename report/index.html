<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>은하수한복 랜딩 유입 리포트</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307@1.0/Paperlogy.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --wine:#2c6f7f;  /* ✅ 메인 컬러 교체 */
  --bg:#ffffff;
  --text:#1b1b1b;
  --muted:#8c8c8c;
}
body{
  margin:0;
  background:#fff;
  font-family:"Paperlogy",-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
}
.wrap{ max-width:520px; margin:0 auto; padding:0 16px 28px; }
.title{
  background:var(--wine);
  color:#fff;
  padding:18px 16px;
  font-size:18px;
  font-weight:800;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
  margin:0 -16px 16px;
}
.card{
  background:#fff;
  border:2px solid var(--wine);
  border-radius:16px;
  padding:16px;
}

.sectionTitle{
  margin-top:10px;
  font-size:13px;
  font-weight:900;
  color:var(--wine);
}

.periodRow{ display:flex; gap:10px; margin-top:8px; }
.periodRow input{
  flex:1;
  border:2px solid var(--wine);
  border-radius:14px;
  padding:10px;
  font-weight:900;
}

.toggleRow{ display:flex; gap:8px; margin-top:10px; }
.toggleRow button{
  flex:1;
  border:2px solid var(--wine);
  background:#fff;
  color:var(--wine);
  border-radius:14px;
  padding:6px 0;
  font-weight:900;
  cursor:pointer;
}
.toggleRow button.active{
  background:var(--wine);
  color:#fff;
}

.btnRow{ display:flex; gap:10px; margin-top:10px; }
.applyBtn, .exportBtn{
  flex:1;
  border:2px solid var(--wine);
  border-radius:14px;
  padding:7px 0;
  font-weight:900;
  cursor:pointer;
}
.applyBtn{ background:var(--wine); color:#fff; }
.exportBtn{ background:#fff; color:var(--wine); }

.meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
.meta .big{
  font-size:16px;
  font-weight:900;
  color:var(--wine);
}
.chartWrap{
  height:290px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}
.sq{
  border:2px solid var(--wine);
  border-radius:14px;
  padding:12px;
}
.lbl{ font-size:13px; font-weight:900; color:#888; }
.val{ font-size:28px; font-weight:900; color:var(--wine); }
</style>
</head>

<body>
<div class="wrap">
  <div class="title">은하수한복 랜딩 유입 리포트</div>

  <div class="card">

    <div class="toggleRow">
      <button data-group="day" class="active">일별</button>
      <button data-group="month">월별</button>
    </div>

    <div class="sectionTitle">기간 선택</div>
    <div class="periodRow">
      <input id="fromDate" type="date">
      <input id="toDate" type="date">
    </div>

    <div class="btnRow">
      <button class="applyBtn" id="applyBtn">조회</button>
      <button class="exportBtn" id="exportBtn">리포트 저장</button>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="meta">
        <div class="big">은하수한복</div>
        <div class="big" id="metaTotal">0</div>
      </div>
      <div class="chartWrap">
        <canvas id="lineChart"></canvas>
      </div>
    </div>

    <div class="grid">
      <div class="sq"><div class="lbl">네이버예약</div><div class="val" id="cardReserve">0</div></div>
      <div class="sq"><div class="lbl">전화문의</div><div class="val" id="cardCall">0</div></div>
      <div class="sq"><div class="lbl">카톡문의</div><div class="val" id="cardKakao">0</div></div>
      <div class="sq"><div class="lbl">더 알아보기</div><div class="val" id="cardMore">0</div></div>
    </div>

  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzxcZWKjh33hmFLLXFAyiMlMIXN0LfUDHUgmd_78_U9lqG1XXruTGcVfn8IEuwY4BieyQ/exec기";

const COLORS = {
  reserve:"#1F5EFF",
  call:"#E03131",
  kakao:"#2F9E44"
};

const $=id=>document.getElementById(id);
const state={ group:"day", lastData:null };

function fmt(n){ return Number(n||0).toLocaleString("ko-KR"); }
function dateISO(d){ return d.toISOString().slice(0,10); }

function initDate(){
  const now=new Date();
  const from=new Date(now);
  from.setDate(now.getDate()-6);
  $("fromDate").value=dateISO(from);
  $("toDate").value=dateISO(now);
}

function setGroup(g){
  state.group=g;
  document.querySelectorAll(".toggleRow button").forEach(b=>{
    b.classList.toggle("active",b.dataset.group===g);
  });
}

// ✅ JSONP 로더(한빔 방식과 동일하게 안정화)
function loadJsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="__eg_cb_"+Math.random().toString(16).slice(2);
    const s=document.createElement("script");
    const sep=url.includes("?") ? "&" : "?";
    const fullUrl=url + sep + "callback=" + cb + "&_=" + Date.now();

    let done=false;
    const timer=setTimeout(()=>{
      if(done) return;
      done=true;
      try{ delete window[cb]; }catch(_){}
      try{ s.remove(); }catch(_){}
      reject(new Error("JSONP_TIMEOUT\n" + fullUrl));
    }, 8000);

    window[cb]=(data)=>{
      if(done) return;
      done=true;
      clearTimeout(timer);
      try{ resolve(data); }
      finally{
        try{ delete window[cb]; }catch(_){}
        try{ s.remove(); }catch(_){}
      }
    };

    s.src=fullUrl;
    s.async=true;
    s.onerror=()=>{
      if(done) return;
      done=true;
      clearTimeout(timer);
      try{ delete window[cb]; }catch(_){}
      try{ s.remove(); }catch(_){}
      reject(new Error("JSONP_LOAD_FAILED\n" + fullUrl));
    };

    document.head.appendChild(s);
  });
}

async function fetchReport(){
  const from=$("fromDate").value;
  const to=$("toDate").value;
  const url=`${GAS_URL}?page=report&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
  return await loadJsonp(url);
}

let chart=null;
function render(labels,series){
  if(chart) chart.destroy();
  chart=new Chart($("lineChart"),{
    type:"line",
    data:{
      labels: labels || [],
      datasets:[
        {label:"네이버예약",data:series?.reserve||[],borderColor:COLORS.reserve,tension:0.35,pointRadius:(state.group==="month")?0:2,pointHoverRadius:(state.group==="month")?0:4},
        {label:"전화문의",data:series?.call||[],borderColor:COLORS.call,tension:0.35,pointRadius:(state.group==="month")?0:2,pointHoverRadius:(state.group==="month")?0:4},
        {label:"카톡문의",data:series?.kakao||[],borderColor:COLORS.kakao,tension:0.35,pointRadius:(state.group==="month")?0:2,pointHoverRadius:(state.group==="month")?0:4}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });
}

async function refresh(){
  const data=await fetchReport();
  if(!data || typeof data!=="object") return;

  $("metaTotal").textContent=fmt(data?.cards?.total||0);
  $("cardReserve").textContent=fmt(data?.cards?.reserve||0);
  $("cardCall").textContent=fmt(data?.cards?.call||0);
  $("cardKakao").textContent=fmt(data?.cards?.kakao||0);
  $("cardMore").textContent=fmt(data?.cards?.more||0);

  render(data.labels||[], data.series||{reserve:[],call:[],kakao:[]});
}

$("applyBtn").addEventListener("click", refresh);
document.querySelectorAll(".toggleRow button").forEach(b=>{
  b.addEventListener("click", ()=>{ setGroup(b.dataset.group); refresh(); });
});

initDate();
refresh();
</script>
</body>
</html>
